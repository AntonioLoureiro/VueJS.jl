    var request = new XMLHttpRequest();

    return new Promise(function (resolve, reject) {

        request.onerror = function() {reject({
                        status: 'error',
                        statusText: 'fatal error'});}
    
        request.onreadystatechange = function () {
            if (request.readyState !== 4) return;
                if (request.status >= 200 && request.status < 300) {
                    resolve(request);
                } else {
                    reject({
                        status: request.status,
                        statusText: request.statusText,
			responseText: request.responseText
                    });
            }};
     request.open(method, url, async);
     request.send(contents);

	});
}
const app_state = {"submit": function(url, sub_content=null,method, async, no_post=false) {
    
if (sub_content==null){
 content={el2:this.el2.value,el3:this.el3.value};
    if (no_post) {
        return content
    } else {
        return xhr(JSON.stringify(content), url, method, async)
    }
    } else {
       if (typeof(sub_content) !== "object") {throw new Error("2nd arg should be object")}
       return xhr(JSON.stringify(sub_content), url, method, async)
    }},"el3":{"value":null},"globals":{},"el1":{"content":null,"color":null},"el2":{"label":"Random Triggered","value":null}}

  var col_out=col.replace(" ", "");

  var col_out=col_out.replace("%","_perc");
  var col_out="col_"+col_out.toLowerCase()
  var obj_search = JSON.parse(cont.search);
  obj_search[col_out]=value;
  cont.search=JSON.stringify(obj_search); 
},adjust_to_window_size : function(w,h,cols){
available_w=window.innerWidth/12*cols;
return {width:""+available_w+"px",height:""+available_w/w*h+"px"}},getcookie :  function(cname) {
    var name = cname + "=";
    var decodedCookie = decodeURIComponent(document.cookie);
    var ca = decodedCookie.split(';');
    for(var i = 0; i <ca.length; i++) {
        var c = ca[i];
        while (c.charAt(0) == ' ') {
          c = c.substring(1);
        }
        if (c.indexOf(name) == 0) {
          return c.substring(name.length, c.length);
        }
    }
    return "";
    }
,toNumber : function (val) {
  var n = parseFloat(val);

    var d = new Date;
    d.setTime(d.getTime() + 24*60*60*1000*days);
    maxage = days*86400;
    document.cookie = name + "=" + value + ";path=/;max-age="+maxage+";expires=" + d.toGMTString();
}
,xhr : function(contents, url=window.location.pathname, method="POST", async=true) {

    var request = new XMLHttpRequest();

    return new Promise(function (resolve, reject) {

        request.onerror = function() {reject({
                        status: 'error',

	});
}},asyncComputed : {comp3 : function(){return this.submit('https://httpbin.org/post',{a:this.comp1}).then(x=>JSON.parse(x.responseText).json.a*2)} },computed : {comp2 : function(){return this.comp1 % 2} ,comp1 : function(){this.globals.heart_beat; return Math.random()*1000} },mounted:function(){app_state.globals.heart_beat=0;setInterval(function(){app.globals.heart_beat=Date.now()},1000);}}).use(vuetify).mount('#app')</script></body></!DOCTYPE html>
